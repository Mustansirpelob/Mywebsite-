<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zenith Lab | Client Workspace</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="animated-sky-scene" aria-hidden="true">
      <div class="cloud cloud--1"></div>
      <div class="cloud cloud--2"></div>
      <div class="cloud cloud--3"></div>
      <div class="scene-ground"></div>
      <div class="anime-model">
        <span class="head"></span><span class="torso"></span><span class="arm left"></span><span class="arm right"></span><span class="leg left"></span><span class="leg right"></span>
      </div>
      <div class="cat-character">
        <span class="cat-body"></span><span class="cat-head"></span><span class="cat-tail"></span>
      </div>
    </div>
    <header class="site-header"><a class="brand" href="index.html">Zenith Lab</a><nav><a href="index.html">Home</a><a href="login.html">Client Login</a></nav></header>
    <main class="page-shell">
      <p class="eyebrow">Client Workspace</p>
      <h1>Project Conversation</h1>
      <p class="hero-subtext">Message the studio and get an immediate professional response from Zenith Mini AI.</p>
      <section class="chat-log" id="chat-log"></section>
      <div class="quick-prompts" id="quick-prompts">
        <button type="button" data-prompt="Can we schedule a discovery call?">Discovery Call</button>
        <button type="button" data-prompt="Can you share your proposal timeline?">Proposal Timeline</button>
        <button type="button" data-prompt="What services do you offer?">Services</button>
      </div>
      <div class="chat-controls">
        <input id="chat-input" type="text" placeholder="Write your message" />
        <button id="send-btn" type="button">Send</button>
        <button id="clear-btn" type="button">Clear</button>
      </div>
      <button id="export-btn" class="mini-button" type="button">Export Transcript</button>
    </main>
    <script src="chat.js"></script>
  </body>
</html>
