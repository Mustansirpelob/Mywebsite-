<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zenith Lab | Owner Access</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="animated-sky-scene" aria-hidden="true">
      <div class="cloud cloud--1"></div>
      <div class="cloud cloud--2"></div>
      <div class="cloud cloud--3"></div>
      <div class="scene-ground"></div>
    </div>
    <main class="page-shell narrow owner-shell">
      <p class="eyebrow">Owner Access</p>
      <h1>Website Control Panel</h1>
      <p class="hero-subtext">Sign in with owner Gmail + password to edit studio content.</p>

      <form id="owner-login-form" class="panel form-grid">
        <label>Owner Gmail<input id="owner-email" type="email" placeholder="owner@zenithlab.dev" required /></label>
        <label>Password<input id="owner-password" type="password" placeholder="••••••••" required /></label>
        <button class="button" type="submit">Sign In as Owner</button>
      </form>

      <section id="owner-console" class="owner-console" hidden>
        <section class="panel">
          <h3>Live Client Conversation</h3>
          <section class="chat-log" id="owner-chat-log"></section>
          <div class="chat-controls">
            <input id="owner-reply" type="text" placeholder="Reply as Owner" />
            <button id="owner-send" type="button">Send Reply</button>
          </div>
        </section>

        <section class="panel teach-panel">
          <h3>AI Knowledge Manager</h3>
          <div class="teach-grid">
            <input id="owner-question" type="text" placeholder="Question to learn" />
            <input id="owner-answer" type="text" placeholder="Answer" />
            <button id="owner-teach" class="mini-button" type="button">Add</button>
          </div>
          <ul id="knowledge-list" class="owner-list"></ul>
        </section>

        <section class="panel teach-panel">
          <h3>Homepage Announcement</h3>
          <div class="teach-grid">
            <input id="announcement-input" type="text" placeholder="Type announcement shown on homepage" />
            <button id="save-announcement" class="mini-button" type="button">Save</button>
          </div>
          <button id="owner-logout" class="mini-button" type="button">Log Out</button>
        </section>
      </section>

      <p id="owner-status" class="status-line">Owner not authenticated.</p>
    </main>
    <script src="owner.js"></script>
  </body>
</html>
